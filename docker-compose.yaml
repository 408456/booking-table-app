services:
  db:
    image: postgres:15
    container_name: booking-postgres-db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: booking-table-app
    ports:
      - "9696:9696"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
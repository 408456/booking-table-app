name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t booking-app-image .

      - name: Save Docker image to file
        run: docker save booking-app-image -o booking-app.tar

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Copy files to server
        run: |
          scp -o StrictHostKeyChecking=no ./booking-app.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~
          scp -o StrictHostKeyChecking=no ./docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/booking-table-app/

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} '
            cd ~/booking-table-app
          
            cat > .env << EOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=booking-service
            POSTGRES_PORT=5432
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=60
            JWT_REFRESH_TOKEN_EXPIRATION_DAYS=1
            LOGGING_LEVEL_ORG_HIBERNATE_SQL=DEBUG
            EOF
          
            docker compose down || true
          
            docker load < ~/booking-app.tar
          
            docker compose up -d

            docker image prune -f
          '
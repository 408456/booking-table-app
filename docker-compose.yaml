services:
  db:
    image: postgres:15
    container_name: booking-postgres-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: booking-table-app
    ports:
      - "9696:9696"
    env_file:
      - .env

volumes:
  db-data: